<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tantramour 2026 — Règles des rapports</title>
<style>
  :root {
    --bg: #ffffff; --surface: #f7f8fa; --border: #e5e7eb;
    --text: #1f2328; --muted: #57606a; --accent: #3b82d4;
    --header-bg: #f0f4fb;
    --green: #166534; --green-bg: #dcfce7; --green-border: #86efac;
    --orange: #c2410c; --orange-bg: #fff7ed; --orange-border: #fdba74;
    --red: #dc2626; --red-bg: #fef2f2; --red-border: #fca5a5;
    --purple: #7c3aed; --purple-bg: #ede9fe; --purple-border: #c4b5fd;
    --blue-bg: #eff6ff; --blue-border: #bfdbfe; --blue-text: #1e40af;
  }
  .dark {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
    --header-bg: #1c2333;
    --green-bg: #052e16; --green-border: #166534;
    --orange-bg: #1c1000; --orange-border: #92400e;
    --red-bg: #2d0a0a; --red-border: #991b1b;
    --purple-bg: #1e1b4b; --purple-border: #5b21b6;
    --blue-bg: #0c1a3a; --blue-border: #1e3a8a; --blue-text: #93c5fd;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system,"Segoe UI",system-ui,sans-serif; font-size: 14px; line-height: 1.6; background: var(--bg); color: var(--text); transition: background .2s, color .2s; }
  .wrap { max-width: 960px; margin: 0 auto; padding: 24px 20px 80px; }

  /* ── HEADER ── */
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; }
  .logo h1 { font-size: 20px; font-weight: 700; }
  .logo p  { font-size: 26px; font-weight: 800; color: var(--purple); line-height: 1.2; margin-top: 2px; }
  .header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .btn-ghost { cursor: pointer; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 6px 14px; font-size: 13px; color: var(--text); font-family: inherit; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
  .btn-ghost:hover { background: var(--border); }

  /* ── FILTRES ── */
  .toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; align-items: flex-end; }
  .fg { display: flex; flex-direction: column; gap: 4px; }
  .fg label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); }
  .fg select, .fg input { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px; font-size: 13px; color: var(--text); font-family: inherit; cursor: pointer; }
  .fg select { min-width: 180px; }
  .fg input  { min-width: 220px; }

  /* ── STATS ── */
  .stats-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }
  .stat-pill { flex: 1; min-width: 100px; border-radius: 8px; padding: 10px 14px; border: 1px solid var(--border); background: var(--surface); text-align: center; }
  .stat-pill .num { font-size: 22px; font-weight: 800; line-height: 1; color: var(--accent); }
  .stat-pill .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); font-weight: 600; margin-top: 2px; }

  /* ── CARTE RAPPORT ── */
  .report-card {
    border: 1px solid var(--border); border-radius: 12px;
    overflow: hidden; margin-bottom: 16px;
    transition: border-color .15s;
  }
  .report-card:hover { border-color: var(--accent); }

  .report-header {
    background: var(--surface); padding: 14px 18px;
    display: flex; align-items: center; gap: 14px;
    cursor: pointer; user-select: none; flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    transition: background .15s;
  }
  .report-header:hover { background: var(--header-bg); }
  .report-icon  { font-size: 22px; flex-shrink: 0; }
  .report-title { font-size: 15px; font-weight: 800; flex: 1; }
  .report-meta  { font-size: 12px; color: var(--muted); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .type-badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; white-space: nowrap; }
  .badge-read   { background: var(--green-bg);   color: var(--green); }
  .badge-edit   { background: var(--orange-bg);  color: var(--orange); }
  .badge-admin  { background: var(--purple-bg);  color: var(--purple); }
  .badge-algo   { background: var(--blue-bg);    color: var(--blue-text); }
  .rule-count   { font-size: 11px; font-weight: 700; background: var(--accent); color: #fff; border-radius: 99px; padding: 1px 8px; }
  .chevron { font-size: 14px; color: var(--muted); margin-left: auto; flex-shrink: 0; transition: transform .2s; }
  .report-card.open .chevron { transform: rotate(90deg); }

  /* ── BODY DU RAPPORT ── */
  .report-body { display: none; padding: 0 18px 18px; background: var(--bg); }
  .report-card.open .report-body { display: block; }

  /* ── SECTION DE RÈGLES ── */
  .rules-section { margin-top: 16px; }
  .rules-section-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .6px; color: var(--muted); padding-bottom: 7px;
    border-bottom: 1px solid var(--border); margin-bottom: 10px;
    display: flex; align-items: center; justify-content: space-between;
  }

  /* ── RÈGLE ── */
  .rule-row {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 9px 0; border-bottom: 1px solid var(--border);
  }
  .rule-row:last-child { border-bottom: none; }
  .rule-icon-wrap {
    width: 30px; height: 30px; border-radius: 6px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; margin-top: 1px;
  }
  .ri-block  { background: var(--red-bg);    border: 1px solid var(--red-border); }
  .ri-check  { background: var(--green-bg);  border: 1px solid var(--green-border); }
  .ri-info   { background: var(--blue-bg);   border: 1px solid var(--blue-border); }
  .ri-warn   { background: var(--orange-bg); border: 1px solid var(--orange-border); }
  .ri-algo   { background: var(--purple-bg); border: 1px solid var(--purple-border); }

  .rule-content { flex: 1; min-width: 0; }
  .rule-text {
    font-size: 13px; color: var(--text); line-height: 1.55;
    padding: 4px 8px; border-radius: 4px; min-height: 28px;
    word-break: break-word;
  }
  .rule-text[contenteditable="true"] {
    border: 1px solid var(--border); background: var(--bg); outline: none;
    cursor: text;
  }
  .rule-text[contenteditable="true"]:focus {
    border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,212,.12);
  }
  .rule-actions { display: flex; gap: 6px; margin-top: 4px; }
  .btn-sm { cursor: pointer; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 5px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: inherit; }
  .btn-sm:hover { background: var(--border); }
  .btn-sm.save  { background: var(--green-bg); color: var(--green); border-color: var(--green-border); }
  .btn-sm.save:hover { filter: brightness(.95); }
  .btn-sm.del   { background: var(--red-bg);  color: var(--red);  border-color: var(--red-border); }
  .btn-sm.del:hover  { filter: brightness(.95); }

  /* ── AJOUTER UNE RÈGLE ── */
  .add-rule-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; align-items: center; }
  .add-rule-row select { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 6px 9px; font-size: 12px; color: var(--text); font-family: inherit; cursor: pointer; }
  .add-rule-row input  { flex: 1; min-width: 200px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font-size: 12px; color: var(--text); font-family: inherit; }
  .add-rule-row input:focus { outline: 2px solid var(--accent); outline-offset: 1px; border-color: var(--accent); }
  .btn-add-rule { cursor: pointer; background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 6px 14px; font-size: 12px; font-weight: 700; font-family: inherit; display: inline-flex; align-items: center; gap: 5px; }
  .btn-add-rule:hover { filter: brightness(1.1); }

  /* ── LIEN VERS LE RAPPORT ── */
  .report-link { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: var(--accent); text-decoration: none; padding: 4px 10px; border: 1px solid var(--blue-border); border-radius: 6px; background: var(--blue-bg); margin-top: 14px; }
  .report-link:hover { filter: brightness(.95); }

  /* ── TOAST ── */
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px); background: #1f2328; color: #fff; border-radius: 8px; padding: 11px 20px; font-size: 13px; font-weight: 700; z-index: 9999; opacity: 0; transition: transform .3s, opacity .3s; white-space: nowrap; }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  #toast.ok  { background: #166534; }

  .empty { text-align: center; padding: 40px; color: var(--muted); border: 2px dashed var(--border); border-radius: 10px; }

  footer { margin-top: 48px; padding-top: 14px; border-top: 1px solid var(--border); text-align: center; font-size: 12px; color: var(--muted); }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo">
      <h1>Tantramour 2026</h1>
      <p>Règles des Rapports</p>
    </div>
    <div class="header-actions">
      <a class="btn-ghost" href="index.html">🏠 Home</a>
      <button class="btn-ghost" id="modeBtn" onclick="toggleMode()">🌙 Mode Nuit</button>
    </div>
  </header>

  <!-- FILTRES -->
  <div class="toolbar">
    <div class="fg">
      <label>Type de rapport</label>
      <select id="filterType" onchange="renderAll()">
        <option value="">Tous les types</option>
        <option value="lecture">📖 Lecture</option>
        <option value="edition">✏️ Édition</option>
        <option value="admin">🔒 Admin</option>
        <option value="algo">🤖 Algorithme</option>
      </select>
    </div>
    <div class="fg">
      <label>Recherche</label>
      <input type="text" id="filterSearch" placeholder="Nom de rapport ou règle…" oninput="renderAll()">
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-bar" id="statsBar"></div>

  <!-- LISTE DES RAPPORTS -->
  <div id="reportList"></div>

</div>

<div id="toast"></div>

<script>

// Chaque règle : { type: 'block'|'check'|'info'|'warn'|'algo', text: string }
// ════════════════════════════════════════════════════════════════
const ICON_MAP = { block:'🚫', check:'✅', info:'ℹ️', warn:'⚠️', algo:'🤖' };
const CLS_MAP  = { block:'ri-block', check:'ri-check', info:'ri-info', warn:'ri-warn', algo:'ri-algo' };

var REPORTS = [

  },
  {
    id: 'problemes',
    icon: '🚨',
    title: 'Problèmes de planning',
    file: 'Rapport_Problemes.html',

    description: 'Détection des ateliers avec ressources insuffisantes ou traducteur manquant.',
    rules: [
      { type: 'block', text: 'Cas 1 — Atelier anglophone sans traducteur : fac1 ou fac2 a le rôle "anglophone" ET le champ traduction est vide.' },
      { type: 'block', text: 'Cas 2 — Ressources insuffisantes : nombre de helpers + traducteur < minimum requis.' },
      { type: 'algo',  text: 'Règle générale : chaque atelier doit avoir au moins 2 ressources (helpers + traducteur cumulés).' },
      { type: 'info',  text: 'Exception MEDITATION / YOGA : 1 seule ressource suffit (helper ou traducteur).' },
      { type: 'block', text: 'Types exclus de la vérification : REPAS & PAUSE, PREPA & LOGITICS, REUNION D\'EQUIPE, TEST, LOVE TEMPLE.' },
      { type: 'block', text: 'Ateliers sans facilitateur (fac1 et fac2 vides) sont également exclus.' },
      { type: 'check', text: 'Édition inline : Traducteur, Helper 1/2/3 modifiables directement depuis la carte problème.' },

// ════════════════════════════════════════════════════════════════
// ÉTAT
// ════════════════════════════════════════════════════════════════
var openCards = new Set();       // IDs des cartes ouvertes
var editingRule = null;          // { reportId, ruleIdx }

// ════════════════════════════════════════════════════════════════
// RENDU PRINCIPAL
// ════════════════════════════════════════════════════════════════
function renderAll() {
  var typeFilter   = document.getElementById('filterType').value;
  var searchFilter = document.getElementById('filterSearch').value.trim().toLowerCase();

  var filtered = REPORTS.filter(function(r) {
    if (typeFilter && r.type !== typeFilter) return false;
    if (searchFilter) {
      var inTitle = r.title.toLowerCase().includes(searchFilter);
      var inDesc  = r.description.toLowerCase().includes(searchFilter);
      var inRules = r.rules.some(function(ru) { return ru.text.toLowerCase().includes(searchFilter); });
      if (!inTitle && !inDesc && !inRules) return false;
    }
    return true;
  });

  // Stats
  var totalRules = filtered.reduce(function(a, r) { return a + r.rules.length; }, 0);
  var byType = { lecture:0, edition:0, admin:0, algo:0 };
  REPORTS.forEach(function(r) { if (byType[r.type] !== undefined) byType[r.type]++; });
  document.getElementById('statsBar').innerHTML =
    stat(REPORTS.length, 'Rapports') +
    stat(REPORTS.reduce(function(a,r){ return a+r.rules.length; },0), 'Règles totales') +
    stat(byType.lecture, '📖 Lecture') +
    stat(byType.edition + byType.admin, '✏️ Édition / Admin') +
    stat(byType.algo, '🤖 Algorithme');

  if (!filtered.length) {
    document.getElementById('reportList').innerHTML = '<div class="empty">Aucun rapport correspondant à votre recherche.</div>';
    return;
  }

  document.getElementById('reportList').innerHTML = filtered.map(function(r) {
    return renderCard(r, searchFilter);
  }).join('');
}

function stat(n, lbl) {
  return '<div class="stat-pill"><div class="num">' + n + '</div><div class="lbl">' + lbl + '</div></div>';
}

// ════════════════════════════════════════════════════════════════
// RENDU CARTE
// ════════════════════════════════════════════════════════════════
const TYPE_LABEL = { lecture:'📖 Lecture', edition:'✏️ Édition', admin:'🔒 Admin', algo:'🤖 Algorithme' };
const TYPE_CLS   = { lecture:'badge-read', edition:'badge-edit', admin:'badge-admin', algo:'badge-algo' };

function renderCard(r, searchFilter) {
  var isOpen = openCards.has(r.id);

  var rulesHtml = r.rules.map(function(rule, idx) {
    var highlighted = searchFilter && rule.text.toLowerCase().includes(searchFilter)
      ? rule.text.replace(new RegExp('(' + esc(searchFilter) + ')', 'gi'), '<mark style="background:#fef08a;border-radius:2px">$1</mark>')
      : esc(rule.text);

    return '<div class="rule-row" id="rulerow_' + r.id + '_' + idx + '">' +
      '<div class="rule-icon-wrap ' + CLS_MAP[rule.type] + '">' + ICON_MAP[rule.type] + '</div>' +
      '<div class="rule-content">' +
        '<div class="rule-text" id="ruletext_' + r.id + '_' + idx + '">' + highlighted + '</div>' +
        '<div class="rule-actions">' +
          '<select class="btn-sm" id="ruletype_' + r.id + '_' + idx + '" title="Changer le type">' +
            Object.keys(ICON_MAP).map(function(t) {
              return '<option value="' + t + '"' + (rule.type === t ? ' selected' : '') + '>' + ICON_MAP[t] + ' ' + t + '</option>';
            }).join('') +
          '</select>' +
          '<button class="btn-sm" onclick="editRule(\'' + r.id + '\',' + idx + ')">✏️ Modifier</button>' +
          '<button class="btn-sm del" onclick="deleteRule(\'' + r.id + '\',' + idx + ')">🗑 Supprimer</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  return '<div class="report-card' + (isOpen ? ' open' : '') + '" id="card_' + r.id + '">' +
    '<div class="report-header" onclick="toggleCard(\'' + r.id + '\')">' +
      '<div class="report-icon">' + r.icon + '</div>' +
      '<div class="report-title">' + esc(r.title) + '</div>' +
      '<div class="report-meta">' +
        '<span class="type-badge ' + TYPE_CLS[r.type] + '">' + TYPE_LABEL[r.type] + '</span>' +
        '<span class="rule-count">' + r.rules.length + ' règle' + (r.rules.length > 1 ? 's' : '') + '</span>' +
        '<span style="font-size:12px;color:var(--muted)">' + esc(r.description) + '</span>' +
      '</div>' +
      '<span class="chevron">›</span>' +
    '</div>' +
    '<div class="report-body">' +
      '<div class="rules-section">' +
        '<div class="rules-section-label">Règles <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:11px;color:var(--muted)">Cliquez ✏️ pour modifier · 🗑 pour supprimer</span></div>' +
        (rulesHtml || '<div style="padding:10px 0;font-size:13px;color:var(--muted);font-style:italic">Aucune règle définie.</div>') +
        '<div class="add-rule-row">' +
          '<select id="newtype_' + r.id + '">' +
            Object.keys(ICON_MAP).map(function(t) {
              return '<option value="' + t + '">' + ICON_MAP[t] + ' ' + t + '</option>';
            }).join('') +
          '</select>' +
          '<input type="text" id="newtext_' + r.id + '" placeholder="Texte de la nouvelle règle…" onkeydown="if(event.key===\'Enter\')addRule(\'' + r.id + '\')">' +
          '<button class="btn-add-rule" onclick="addRule(\'' + r.id + '\')">＋ Ajouter</button>' +
        '</div>' +
      '</div>' +
      '<a class="report-link" href="' + esc(r.file) + '" target="_blank" rel="noopener">🔗 Ouvrir ' + esc(r.title) + ' →</a>' +
    '</div>' +
  '</div>';
}

// ════════════════════════════════════════════════════════════════
// ACTIONS
// ════════════════════════════════════════════════════════════════
function toggleCard(id) {
  if (openCards.has(id)) openCards.delete(id);
  else openCards.add(id);
  renderAll();
  // Re-scroll vers la carte ouverte
  setTimeout(function() {
    var el = document.getElementById('card_' + id);
    if (el && openCards.has(id)) el.scrollIntoView({ behavior:'smooth', block:'nearest' });
  }, 50);
}
window.toggleCard = toggleCard;

function editRule(reportId, idx) {
  var report = REPORTS.find(function(r) { return r.id === reportId; });
  if (!report) return;
  var rule = report.rules[idx];
  var textEl = document.getElementById('ruletext_' + reportId + '_' + idx);
  if (!textEl) return;

  // Activer l'édition inline
  textEl.contentEditable = 'true';
  textEl.textContent = rule.text; // texte brut (sans highlights)
  textEl.focus();

  // Sélectionner tout le texte
  var range = document.createRange();
  range.selectNodeContents(textEl);
  window.getSelection().removeAllRanges();
  window.getSelection().addRange(range);

  // Remplacer les boutons par Enregistrer / Annuler
  var actionsEl = textEl.nextElementSibling;
  if (actionsEl) {
    actionsEl.innerHTML =
      '<button class="btn-sm save" onclick="saveRule(\'' + reportId + '\',' + idx + ')">💾 Enregistrer</button>' +
      '<button class="btn-sm" onclick="cancelEdit(\'' + reportId + '\',' + idx + '\')">Annuler</button>';
  }
  textEl.onkeydown = function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveRule(reportId, idx); }
    if (e.key === 'Escape') cancelEdit(reportId, idx);
  };
}
window.editRule = editRule;

function saveRule(reportId, idx) {
  var report = REPORTS.find(function(r) { return r.id === reportId; });
  if (!report) return;
  var textEl = document.getElementById('ruletext_' + reportId + '_' + idx);
  var typeEl = document.getElementById('ruletype_' + reportId + '_' + idx);
  if (!textEl) return;

  var newText = textEl.textContent.trim();
  var newType = typeEl ? typeEl.value : report.rules[idx].type;
  if (!newText) { showToast('Le texte ne peut pas être vide.'); return; }

  report.rules[idx].text = newText;
  report.rules[idx].type = newType;
  showToast('✅ Règle mise à jour.', 'ok');
  renderAll();
}
window.saveRule = saveRule;

function cancelEdit(reportId, idx) {
  renderAll();
}
window.cancelEdit = cancelEdit;

function deleteRule(reportId, idx) {
  var report = REPORTS.find(function(r) { return r.id === reportId; });
  if (!report) return;
  if (!confirm('Supprimer cette règle ?')) return;
  report.rules.splice(idx, 1);
  showToast('🗑 Règle supprimée.', 'ok');
  renderAll();
}
window.deleteRule = deleteRule;

function addRule(reportId) {
  var report = REPORTS.find(function(r) { return r.id === reportId; });
  if (!report) return;
  var textEl = document.getElementById('newtext_' + reportId);
  var typeEl = document.getElementById('newtype_' + reportId);
  var text = textEl ? textEl.value.trim() : '';
  var type = typeEl ? typeEl.value : 'info';
  if (!text) { textEl && textEl.focus(); return; }
  report.rules.push({ type: type, text: text });
  if (textEl) textEl.value = '';
  showToast('✅ Règle ajoutée.', 'ok');
  renderAll();
}
window.addRule = addRule;

// ════════════════════════════════════════════════════════════════
// UTILITAIRES
// ════════════════════════════════════════════════════════════════
function esc(v) {
  return String(v || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (type ? ' ' + type : '');
  clearTimeout(t._t);
  t._t = setTimeout(function() { t.className = ''; }, 3000);
}

function toggleMode() {
  var dark = document.body.classList.toggle('dark');
  document.getElementById('modeBtn').textContent = dark ? '☀️ Mode Jour' : '🌙 Mode Nuit';
}
window.toggleMode = toggleMode;

// ── Démarrage ──
renderAll();
</script>
