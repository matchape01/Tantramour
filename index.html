<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tantramour 2026</title>
<style>
  :root {
    --bg:#ffffff; --surface:#f7f8fa; --border:#e5e7eb;
    --text:#1f2328; --muted:#57606a; --accent:#3b82d4;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:-apple-system,"Segoe UI",system-ui,sans-serif;
    font-size:15px; line-height:1.6;
    background:var(--bg); color:var(--text);
    min-height:100vh;
    display:flex; flex-direction:column;
  }

  /* ── BARRE LANGUE ── */
  .lang-bar {
    position:fixed; top:14px; right:18px; z-index:999;
  }
  .lang-bar button {
    cursor:pointer; background:var(--bg); border:1px solid var(--border);
    border-radius:20px; padding:5px 14px; font-size:12px; font-weight:700;
    color:var(--text); font-family:inherit; box-shadow:0 1px 4px rgba(0,0,0,.08);
    transition:background .15s, border-color .15s;
  }
  .lang-bar button:hover { background:var(--surface); border-color:var(--accent); color:var(--accent); }

  /* ── CONTENU CENTRAL ── */
  .main {
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:40px 24px 20px;
  }

  /* ── LOGO ── */
  .logo { text-align:center; margin-bottom:48px; }
  .logo-sub { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:2px; color:var(--muted); margin-bottom:10px; }
  .logo h1  { font-size:38px; font-weight:800; letter-spacing:-.5px; color:var(--text); line-height:1.1; }
  .logo h2  { font-size:15px; font-weight:400; color:var(--muted); margin-top:8px; }

  /* ── BOUTON PRINCIPAL ── */
  .main-btn {
    display:flex; align-items:center; justify-content:space-between; gap:16px;
    width:100%; max-width:400px;
    background:var(--accent); color:#fff;
    border:none; border-radius:14px; padding:20px 24px;
    font-size:17px; font-weight:700; font-family:inherit;
    cursor:pointer; text-decoration:none;
    transition:filter .15s, transform .1s;
    box-shadow:0 4px 20px rgba(59,130,212,.3);
    margin-bottom:16px;
  }
  .main-btn:hover { filter:brightness(1.08); transform:translateY(-2px); }
  .main-btn:active { transform:translateY(0); }
  .main-btn-left { display:flex; align-items:center; gap:14px; }
  .main-btn-icon { font-size:28px; flex-shrink:0; }
  .main-btn-text { text-align:left; }
  .main-btn-title { font-size:17px; font-weight:700; line-height:1.2; }
  .main-btn-desc  { font-size:12px; font-weight:400; opacity:.85; margin-top:2px; }
  .main-btn-arrow { font-size:22px; opacity:.7; flex-shrink:0; }

  /* ── FOOTER DREAMTEAM ── */
  footer {
    padding:24px; text-align:center;
  }
  .dreamteam-btn {
    cursor:pointer; background:transparent; border:1px solid var(--border);
    border-radius:20px; padding:8px 20px; font-size:12px; font-weight:700;
    color:var(--muted); font-family:inherit; letter-spacing:.5px;
    transition:border-color .15s, color .15s, background .15s;
    display:inline-flex; align-items:center; gap:7px;
  }
  .dreamteam-btn:hover { border-color:var(--text); color:var(--text); background:var(--surface); }

  /* ── MODALE MOT DE PASSE ── */
  .pw-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,.5); z-index:9999;
    align-items:center; justify-content:center; padding:20px;
  }
  .pw-overlay.open { display:flex; }
  .pw-box {
    background:#fff; border-radius:14px; padding:36px 32px;
    max-width:340px; width:100%;
    box-shadow:0 12px 40px rgba(0,0,0,.2);
    font-family:-apple-system,"Segoe UI",system-ui,sans-serif;
  }
  .pw-icon { font-size:32px; margin-bottom:10px; }
  .pw-title { font-size:18px; font-weight:800; color:#1f2328; margin-bottom:6px; }
  .pw-sub   { font-size:13px; color:#57606a; margin-bottom:22px; }
  .pw-input {
    width:100%; padding:11px 14px; border:1px solid #e5e7eb;
    border-radius:8px; font-size:16px; outline:none; margin-bottom:10px;
    transition:border-color .15s;
    font-family:inherit; letter-spacing:4px; text-align:center;
  }
  .pw-input:focus { border-color:#3b82d4; box-shadow:0 0 0 3px rgba(59,130,212,.12); }
  .pw-error { font-size:12px; color:#dc2626; min-height:18px; margin-bottom:12px; text-align:center; }
  .pw-actions { display:flex; gap:10px; }
  .pw-cancel {
    flex:1; padding:10px; border:1px solid #e5e7eb; border-radius:8px;
    background:#f7f8fa; font-size:14px; cursor:pointer; font-family:inherit;
  }
  .pw-cancel:hover { background:#e5e7eb; }
  .pw-confirm {
    flex:1; padding:10px; border:none; border-radius:8px;
    background:#3b82d4; color:#fff; font-size:14px; font-weight:700;
    cursor:pointer; font-family:inherit;
  }
  .pw-confirm:hover { background:#2563eb; }
</style>
<script src="ref_translations.js"></script>
<script src="i18n.js"></script>
</head>
<body>

<!-- ── BARRE LANGUE ── -->
<div class="lang-bar">
  <button id="langBtn" onclick="I18n.setLang(I18n.getLang()==='fr'?'en':'fr')">🌐 EN</button>
</div>

<!-- ── CONTENU PRINCIPAL ── -->
<main class="main">

  <div class="logo">
    <div class="logo-sub">Festival · 29 août – 4 septembre 2026</div>
    <h1>Tantramour</h1>
    <h1>2026</h1>
    <h2>Bienvenue · Welcome</h2>
  </div>

  <a class="main-btn" href="Rapport_Programme.html" target="_blank" rel="noopener">
    <div class="main-btn-left">
      <div class="main-btn-icon">🎪</div>
      <div class="main-btn-text">
        <div class="main-btn-title" data-i18n="prog_btn_title">Programme des Ateliers</div>
        <div class="main-btn-desc"  data-i18n="prog_btn_desc">Découvrez les ateliers jour par jour</div>
      </div>
    </div>
    <div class="main-btn-arrow">›</div>
  </a>

</main>

<!-- ── FOOTER DREAMTEAM ── -->
<footer>
  <button class="dreamteam-btn" onclick="openPw()">
    🌀 <span data-i18n="dreamteam_btn">DREAM TEAM</span>
  </button>
</footer>

<!-- ── MODALE MOT DE PASSE ── -->
<div class="pw-overlay" id="pwOverlay" onclick="overlayClick(event)">
  <div class="pw-box" id="pwBox">
    <div class="pw-icon">🔒</div>
    <div class="pw-title" data-i18n="pw_acces_restreint">Accès restreint</div>
    <div class="pw-sub"   data-i18n="dreamteam_pw_sub">Espace réservé à l'équipe Tantramour.</div>
    <input id="pwInput" class="pw-input" type="password"
      placeholder="••••••"
      autocomplete="off"
      onkeydown="if(event.key==='Enter')checkPw()"
    />
    <div class="pw-error" id="pwError"></div>
    <div class="pw-actions">
      <button class="pw-cancel"  onclick="closePw()"  data-i18n="pw_annuler">Annuler</button>
      <button class="pw-confirm" onclick="checkPw()"  data-i18n="pw_ouvrir">Ouvrir</button>
    </div>
  </div>
</div>

<script>
// ── Bouton FR/EN ─────────────────────────────────────────────────────────────
function updateLangBtn() {
  var btn = document.getElementById('langBtn');
  if (!btn) return;
  var lang = (typeof I18n !== 'undefined') ? I18n.getLang() : 'fr';
  btn.textContent = lang === 'fr' ? '🌐 EN' : '🌐 FR';
  btn.title = lang === 'fr' ? 'Switch to English' : 'Passer en Français';
}
updateLangBtn();
document.addEventListener('tm_lang_changed', updateLangBtn);

// ── Mot de passe ────────────────────────────────────────────────────────────
var PW = 'ohm';

function openPw() {
  document.getElementById('pwInput').value = '';
  document.getElementById('pwError').textContent = '';
  document.getElementById('pwOverlay').classList.add('open');
  setTimeout(function() { document.getElementById('pwInput').focus(); }, 80);
}

function closePw() {
  document.getElementById('pwOverlay').classList.remove('open');
}

function overlayClick(e) {
  if (e.target === document.getElementById('pwOverlay')) closePw();
}

function checkPw() {
  var val = document.getElementById('pwInput').value;
  if (val === PW) {
    closePw();
    window.location.href = 'index_bis.html';
  } else {
    var err = document.getElementById('pwError');
    err.textContent = I18n.t('pw_incorrect');
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
    // Petite animation shake
    var inp = document.getElementById('pwInput');
    inp.style.borderColor = '#dc2626';
    setTimeout(function() { inp.style.borderColor = ''; }, 1200);
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closePw();
});
</script>
</body>
</html>
