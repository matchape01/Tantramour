<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tantramour 2026 — Logistique manquante</title>
<script src="ref_translations.js"></script>
<script src="i18n.js"></script>
<style>
  :root {
    --bg:#ffffff; --surface:#f7f8fa; --border:#e5e7eb;
    --text:#1f2328; --muted:#57606a; --accent:#3b82d4;
    --green:#16a34a; --green-bg:#dcfce7; --green-border:#86efac;
    --orange:#d97706; --orange-bg:#fef3c7; --orange-border:#fcd34d;
    --red:#dc2626; --red-bg:#fee2e2; --red-border:#fca5a5;
    --tag-bg:#eef2ff; --tag-text:#3b5bdb;
  }
  .dark {
    --bg:#0d1117; --surface:#161b22; --border:#30363d;
    --text:#e6edf3; --muted:#8b949e; --accent:#58a6ff;
    --green-bg:#052e16; --green-border:#166534;
    --orange-bg:#2d1a00; --orange-border:#92400e;
    --red-bg:#2d0a0a; --red-border:#991b1b;
    --tag-bg:#1c2a4a; --tag-text:#79a8ff;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,"Segoe UI",system-ui,sans-serif; font-size:14px; line-height:1.6; background:var(--bg); color:var(--text); transition:background .2s,color .2s; }
  .wrap { max-width:960px; margin:0 auto; padding:24px 20px 80px; }

  header { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; flex-wrap:wrap; gap:12px; }
  .logo h1 { font-size:19px; font-weight:700; }
  .logo p  { font-size:22px; font-weight:800; color:var(--red); line-height:1.2; margin-top:2px; }
  .header-actions { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .btn { cursor:pointer; background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:7px 14px; font-size:13px; color:var(--text); font-family:inherit; display:inline-flex; align-items:center; gap:6px; text-decoration:none; transition:background .15s; }
  .btn:hover { background:var(--border); }

  /* ── STATS ── */
  .stats-bar { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:22px; }
  .stat-pill { flex:1; min-width:110px; border-radius:8px; padding:12px 14px; border:1px solid var(--border); background:var(--surface); text-align:center; }
  .stat-pill .num { font-size:26px; font-weight:800; line-height:1; color:var(--accent); }
  .stat-pill .lbl { font-size:10px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); font-weight:600; margin-top:3px; }
  .stat-pill.ok   { border-color:var(--green-border); background:var(--green-bg); }
  .stat-pill.ok .num   { color:var(--green); }
  .stat-pill.warn { border-color:var(--orange-border); background:var(--orange-bg); }
  .stat-pill.warn .num { color:var(--orange); }
  .stat-pill.err  { border-color:var(--red-border); background:var(--red-bg); }
  .stat-pill.err .num  { color:var(--red); }

  /* ── FILTRES ── */
  .filters { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:18px; align-items:flex-end; }
  .fg { display:flex; flex-direction:column; gap:4px; }
  .fg label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); }
  .fg select { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:7px 10px; font-size:13px; color:var(--text); font-family:inherit; cursor:pointer; min-width:160px; }

  /* ── SÉPARATEUR FACILITATEUR ── */
  .fac-sep { font-size:13px; font-weight:700; padding:10px 14px; border-radius:8px; background:var(--surface); border:1px solid var(--border); margin:20px 0 10px; display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .fac-sep-name { display:flex; align-items:center; gap:10px; }
  .fac-avatar { width:34px; height:34px; border-radius:50%; background:var(--accent); color:#fff; font-size:13px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .fac-count { font-size:11px; font-weight:700; background:var(--red); color:#fff; border-radius:99px; padding:2px 8px; }

  /* ── CARTES ATELIERS ── */
  .card-list { display:flex; flex-direction:column; gap:8px; margin-bottom:6px; }
  .ws-card { border-radius:10px; border:1px solid var(--red-border); overflow:hidden; }
  .ws-card.warn-only { border-color:var(--orange-border); }

  .ws-header { display:flex; align-items:center; gap:12px; padding:11px 16px; flex-wrap:wrap; background:var(--red-bg); }
  .ws-card.warn-only .ws-header { background:var(--orange-bg); }
  .dark .ws-card .ws-header { background:var(--red-bg); }
  .dark .ws-card.warn-only .ws-header { background:var(--orange-bg); }

  .ws-type-badge { font-size:11px; font-weight:700; padding:2px 8px; border-radius:4px; background:var(--tag-bg); color:var(--tag-text); white-space:nowrap; }
  .ws-name { font-size:14px; font-weight:700; flex:1; min-width:0; }
  .ws-meta-time { font-size:12px; color:var(--muted); white-space:nowrap; }

  .ws-body { padding:10px 16px 12px; background:var(--bg); border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; }
  .ws-info { font-size:12px; color:var(--muted); display:flex; gap:12px; flex-wrap:wrap; }

  .pill { display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:700; padding:3px 9px; border-radius:99px; white-space:nowrap; }
  .pill-miss { background:var(--red-bg);    color:var(--red);    border:1px solid var(--red-border); }
  .pill-warn { background:var(--orange-bg); color:var(--orange); border:1px solid var(--orange-border); }

  .edit-link { display:inline-flex; align-items:center; gap:5px; font-size:12px; font-weight:600; padding:5px 12px; border-radius:6px; background:var(--accent); color:#fff; text-decoration:none; cursor:pointer; font-family:inherit; transition:filter .15s; border:none; }
  .edit-link:hover { filter:brightness(1.1); }

  .empty { text-align:center; padding:48px 20px; color:var(--muted); font-style:italic; border:2px dashed var(--border); border-radius:12px; }
  footer { margin-top:48px; padding-top:14px; border-top:1px solid var(--border); text-align:center; font-size:12px; color:var(--muted); }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo">
      <h1>Tantramour 2026</h1>
      <p>📋 <span data-i18n="rlm_title">Logistique manquante</span></p>
    </div>
    <div class="header-actions" id="headerActions">
      <a class="btn" href="index_bis.html">🏠 <span data-i18n="nav_home">Home</span></a>
      <button class="btn" onclick="hardReload()">🔄 <span data-i18n="nav_refresh">Refresh</span></button>
      <button class="btn" id="modeBtn" onclick="toggleMode()">🌙 <span data-i18n="nav_mode_nuit">Mode Nuit</span></button>
    </div>
  </header>

  <!-- ── STATS ── -->
  <div class="stats-bar">
    <div class="stat-pill"><div class="num" id="statTotal">—</div><div class="lbl" data-i18n="rlm_stat_total">Ateliers avec Fac</div></div>
    <div class="stat-pill ok"><div class="num" id="statOk">—</div><div class="lbl" data-i18n="rlm_stat_ok">Renseignés ✓</div></div>
    <div class="stat-pill ok"><div class="num" id="statValidated">—</div><div class="lbl" data-i18n="rlm_stat_validated">Validés Fac ✓</div></div>
    <div class="stat-pill err"><div class="num" id="statMissing">—</div><div class="lbl" data-i18n="rlm_stat_missing">Info manquante</div></div>
    <div class="stat-pill warn"><div class="num" id="statNotValidated">—</div><div class="lbl" data-i18n="rlm_stat_not_validated">Non validés</div></div>
  </div>

  <!-- ── FILTRES ── -->
  <div class="filters">
    <div class="fg">
      <label data-i18n="col_jour">Jour</label>
      <select id="filterJour" onchange="render()">
        <option value="" data-i18n="filter_tous_jours">Tous les jours</option>
      </select>
    </div>
    <div class="fg">
      <label data-i18n="col_facilitateur">Facilitateur(s)</label>
      <select id="filterFac" onchange="render()">
        <option value="" data-i18n="filter_tous_fac">Tous les facilitateurs</option>
      </select>
    </div>
    <div class="fg">
      <label data-i18n="col_type">Type</label>
      <select id="filterType" onchange="render()">
        <option value="" data-i18n="filter_tous_types">Tous les types</option>
      </select>
    </div>
    <div class="fg">
      <label data-i18n="rlm_filter_status">Statut</label>
      <select id="filterStatus" onchange="render()">
        <option value=""            data-i18n="rdm_status_all">Tous</option>
        <option value="no-info"     data-i18n="rlm_status_no_info">Info manquante</option>
        <option value="not-validated" data-i18n="rlm_status_not_validated">Non validé Fac</option>
        <option value="both"        data-i18n="rlm_status_both">Manquant ET non validé</option>
      </select>
    </div>
  </div>

  <!-- ── LISTE ── -->
  <div id="cardList"></div>

</div>

<footer data-i18n="rlm_footer">Tantramour 2026 — Suivi de la logistique</footer>

<script src="loader.js"></script>
<script>
loadData(['data.js', 'logistics.js'], function() {

// ══════════════════════════════════════
// CONFIG
// ══════════════════════════════════════
var JOUR_ORDER = ['Jour 1','Jour 2','Jour 3','Jour 4','Jour 5','Jour 6','Jour 7'];
var JOUR_META  = {
  'Jour 1':{ date:'Samedi 29 août',   emoji:'🌅' },
  'Jour 2':{ date:'Dimanche 30 août', emoji:'☀️' },
  'Jour 3':{ date:'Lundi 31 août',    emoji:'🌿' },
  'Jour 4':{ date:'Mardi 1 sept.',    emoji:'🔥' },
  'Jour 5':{ date:'Mercredi 2 sept.', emoji:'💧' },
  'Jour 6':{ date:'Jeudi 3 sept.',    emoji:'🌙' },
  'Jour 7':{ date:'Vendredi 4 sept.', emoji:'✨' },
};

// Types internes à exclure (pas de besoin logistique)
var TYPES_EXCLUS = ['REPAS & PAUSE','PREPA & LOGITICS','REUNION D\'EQUIPE','TEST'];

// ══════════════════════════════════════
// DONNÉES — tous les ateliers avec au moins un fac, hors types internes
// ══════════════════════════════════════
var ATELIERS = AGENDA.filter(function(e) {
  return (e.fac1 || e.fac2) && TYPES_EXCLUS.indexOf(e.type) === -1;
}).sort(function(a, b) {
  var ji = JOUR_ORDER.indexOf(a.jour) - JOUR_ORDER.indexOf(b.jour);
  if (ji !== 0) return ji;
  return heureMin(a.heure) - heureMin(b.heure);
});

// ══════════════════════════════════════
// STATUT LOGISTIQUE D'UN ATELIER
// ══════════════════════════════════════
function getLogStatus(e) {
  var entry = e.logisticId && LOGISTICS[e.logisticId];
  var hasContent  = entry && (LOGISTICS[e.logisticId].text || '').trim().length > 0;
  var isValidated = entry && !!LOGISTICS[e.logisticId].validatedByFac;
  return { hasContent: hasContent, isValidated: isValidated };
}

// Un atelier est "à traiter" s'il n'a pas d'info OU n'est pas validé
function needsAttention(e) {
  var s = getLogStatus(e);
  return !s.hasContent || !s.isValidated;
}

// ══════════════════════════════════════
// STATS GLOBALES
// ══════════════════════════════════════
function updateStats() {
  var total = ATELIERS.length;
  var ok = 0, validated = 0, missing = 0, notValidated = 0;
  ATELIERS.forEach(function(e) {
    var s = getLogStatus(e);
    if (s.hasContent)   ok++;
    if (s.isValidated)  validated++;
    if (!s.hasContent)  missing++;
    if (!s.isValidated) notValidated++;
  });
  document.getElementById('statTotal').textContent       = total;
  document.getElementById('statOk').textContent          = ok;
  document.getElementById('statValidated').textContent   = validated;
  document.getElementById('statMissing').textContent     = missing;
  document.getElementById('statNotValidated').textContent = notValidated;
}

// ══════════════════════════════════════
// PEUPLEMENT DES FILTRES
// ══════════════════════════════════════
function buildFilters() {
  var joursPresents = new Set();
  var facsPresents  = new Set();
  var typesPresents = new Set();
  ATELIERS.forEach(function(e) {
    if (e.jour) joursPresents.add(e.jour);
    if (e.fac1) facsPresents.add(e.fac1);
    if (e.fac2) facsPresents.add(e.fac2);
    if (e.type) typesPresents.add(e.type);
  });

  var selJour = document.getElementById('filterJour');
  JOUR_ORDER.filter(function(j){ return joursPresents.has(j); }).forEach(function(j) {
    var meta = JOUR_META[j] || {};
    var o = document.createElement('option');
    o.value = j;
    o.textContent = j + (meta.date ? ' — ' + meta.date : '');
    selJour.appendChild(o);
  });

  var selFac = document.getElementById('filterFac');
  Array.from(facsPresents).sort(function(a,b){ return a.localeCompare(b,'fr'); }).forEach(function(f) {
    var o = document.createElement('option');
    o.value = f; o.textContent = f;
    selFac.appendChild(o);
  });
  var selType = document.getElementById('filterType');
  Array.from(typesPresents).sort().forEach(function(t) {
    var o = document.createElement('option');
    o.value = t; o.textContent = t;
    selType.appendChild(o);
  });
}

// ══════════════════════════════════════
// RENDU
// ══════════════════════════════════════
function render() {
  var fJour   = document.getElementById('filterJour').value;
  var fFac    = document.getElementById('filterFac').value;
  var fType   = document.getElementById('filterType').value;
  var fStatus = document.getElementById('filterStatus').value;

  var filtered = ATELIERS.filter(function(e) {
    if (fJour && e.jour !== fJour) return false;
    if (fFac  && e.fac1 !== fFac && e.fac2 !== fFac) return false;
    if (fType && e.type !== fType) return false;
    var s = getLogStatus(e);
    if (fStatus === 'no-info'       && s.hasContent)              return false;
    if (fStatus === 'not-validated' && s.isValidated)             return false;
    if (fStatus === 'both'          && (s.hasContent && s.isValidated)) return false;
    // Par défaut : n'afficher que ceux qui nécessitent attention
    if (!fStatus && !needsAttention(e))                           return false;
    return true;
  });

  var container = document.getElementById('cardList');
  if (!filtered.length) {
    container.innerHTML = '<div class="empty">' + I18n.t('rlm_empty') + '</div>';
    return;
  }

  // Grouper par facilitateur principal (fac1, ou fac2 si pas de fac1)
  var byFac = {};
  filtered.forEach(function(e) {
    var fac = e.fac1 || e.fac2 || '?';
    // Si filtre fac actif et e.fac2 correspond mieux, utiliser fac2 comme groupe
    if (fFac && e.fac1 !== fFac && e.fac2 === fFac) fac = e.fac2;
    if (!byFac[fac]) byFac[fac] = [];
    byFac[fac].push(e);
  });

  var facsSorted = Object.keys(byFac).sort(function(a,b){ return a.localeCompare(b,'fr'); });

  var html = '';
  facsSorted.forEach(function(fac) {
    var items = byFac[fac];
    var initials = fac.split(' ').filter(Boolean).slice(0,2).map(function(w){ return w[0].toUpperCase(); }).join('');
    html += '<div class="fac-sep">' +
      '<div class="fac-sep-name">' +
        '<div class="fac-avatar">' + esc(initials) + '</div>' +
        '<span>' + esc(fac) + '</span>' +
      '</div>' +
      '<span class="fac-count">' + items.length + '</span>' +
    '</div>';
    html += '<div class="card-list">' +
      items.map(function(e) { return renderCard(e); }).join('') +
    '</div>';
  });

  container.innerHTML = html;
}
window.render = render;

function renderCard(e) {
  var s    = getLogStatus(e);
  var facs = [e.fac1, e.fac2].filter(Boolean).join(' & ');
  var meta = JOUR_META[e.jour] || {};

  // Classe : rouge = info manquante, orange = info ok mais non validée
  var cls = (!s.hasContent) ? '' : 'warn-only';

  // Pills de statut
  var pills = '';
  if (!s.hasContent) {
    pills += '<span class="pill pill-miss">⚠ ' + I18n.t('rlm_no_info') + '</span>';
  }
  if (!s.isValidated) {
    pills += '<span class="pill pill-warn">⏳ ' + I18n.t('rlm_not_validated') + '</span>';
  }

  return '<div class="ws-card' + (cls ? ' ' + cls : '') + '">' +
    '<div class="ws-header">' +
      '<span class="ws-type-badge">' + esc(e.type || '') + '</span>' +
      '<span class="ws-name">' + esc(e.atelier || '—') + (e.piment > 0 ? ' <span style="letter-spacing:-1px;font-size:13px">' + '🌶️'.repeat(e.piment) + '</span>' : '') + '</span>' +
      '<span class="ws-meta-time">' + esc(e.jour) + (meta.date ? ' — ' + esc(meta.date) : '') + (e.heure ? ' · ' + esc(e.heure) : '') + '</span>' +
    '</div>' +
    '<div class="ws-body">' +
      '<div class="ws-info">' +
        (e.lieu ? '<span>📍 ' + esc(e.lieu) + '</span>' : '') +
        (facs   ? '<span>🎓 ' + esc(facs)   + '</span>' : '') +
      '</div>' +
      '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">' +
        pills +
        '<a class="edit-link" href="Rapport_Logistics_Input.html" target="_blank" rel="noopener">✏️ ' + I18n.t('rlm_edit_btn') + '</a>' +
      '</div>' +
    '</div>' +
  '</div>';
}

// ══════════════════════════════════════
// UTILITAIRES
// ══════════════════════════════════════
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function heureMin(h) {
  if (!h) return 9999;
  var m = String(h).replace(/\./g,':').match(/(\d{1,2}):(\d{2})/);
  return m ? parseInt(m[1])*60+parseInt(m[2]) : 9999;
}
function hardReload() {
  if ('caches' in window) {
    caches.keys().then(function(k){ return Promise.all(k.map(function(x){ return caches.delete(x); })); })
      .finally(function(){ location.reload(true); });
  } else { location.reload(true); }
}
window.hardReload = hardReload;
function toggleMode() {
  var isDark = document.body.classList.toggle('dark');
  document.getElementById('modeBtn').textContent = isDark ? I18n.t('nav_mode_jour') : I18n.t('nav_mode_nuit');
}
window.toggleMode = toggleMode;

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
buildFilters();
updateStats();
render();

if (typeof I18n !== 'undefined') {
  I18n.renderToggleBtn('headerActions', 'btn');
}

document.addEventListener('tm_lang_changed', function() {
  render();
  var isDark = document.body.classList.contains('dark');
  document.getElementById('modeBtn').textContent = isDark ? I18n.t('nav_mode_jour') : I18n.t('nav_mode_nuit');
});

}); // fin loadData
</script>
</body>
</html>
